    <div class="copy-toast" id="copy-toast" role="status" aria-live="polite"></div>

    <script>
        const workItems = document.querySelectorAll(".work-item");
        const viewer = document.querySelector("#document-viewer");
        const title = document.querySelector("#document-title");
        const openDocument = document.querySelector("#open-document");
        const copyToast = document.querySelector("#copy-toast");
        const profilePhoto = document.querySelector("#profile-photo");
        let toastTimer;

        const profilePhotos = [
            "photo/photo1.jpg",
            "photo/photo2.jpg",
            "photo/photo3.jpg",
            "photo/photo4.jpg"
        ];
        const photoStorageKey = "jingqi-profile-photo-index";
        let currentPhotoIndex = 0;
        let bottomLatched = false;

        function savePhotoIndex() {
            sessionStorage.setItem(photoStorageKey, String(currentPhotoIndex));
        }

        function showPhoto(index) {
            currentPhotoIndex = (index + profilePhotos.length) % profilePhotos.length;
            profilePhoto.src = profilePhotos[currentPhotoIndex];
            savePhotoIndex();
        }

        function showNextPhoto() {
            profilePhoto.classList.add("is-changing");

            setTimeout(() => {
                showPhoto(currentPhotoIndex + 1);
                profilePhoto.addEventListener("load", () => {
                    profilePhoto.classList.remove("is-changing");
                }, { once: true });

                if (profilePhoto.complete) {
                    profilePhoto.classList.remove("is-changing");
                }
            }, 120);
        }

        function isPageBottom() {
            const scrollBottom = window.scrollY + window.innerHeight;
            return scrollBottom >= document.documentElement.scrollHeight - 4;
        }

        function initializePhotoRotation() {
            const storedIndex = sessionStorage.getItem(photoStorageKey);

            if (storedIndex === null) {
                showPhoto(0);
                return;
            }

            const parsedIndex = Number.parseInt(storedIndex, 10);
            currentPhotoIndex = Number.isNaN(parsedIndex) ? 0 : parsedIndex;
            showPhoto(currentPhotoIndex + 1);
        }

        profilePhotos.forEach((photoPath) => {
            const image = new Image();
            image.src = photoPath;
        });

        initializePhotoRotation();

        window.addEventListener("load", () => {
            bottomLatched = isPageBottom();
        });

        window.addEventListener("scroll", () => {
            const atBottom = isPageBottom();

            if (atBottom && !bottomLatched) {
                bottomLatched = true;
                showNextPhoto();
            } else if (!atBottom) {
                bottomLatched = false;
            }
        }, { passive: true });

        window.addEventListener("pageshow", (event) => {
            if (!event.persisted) {
                return;
            }

            showNextPhoto();
            bottomLatched = isPageBottom();
        });

        const citations = {
            "learning-through-play": `@article{fan2025decentralized,
  title={Decentralized Asynchronous Multi-player Bandits},
  author={Fan, Jingqi and Zhao, Canzhe and Li, Shuai and Wang, Siwei},
  journal={arXiv preprint arXiv:2509.25824},
  year={2025}
}`,
            "multiplayer-bandits": `@inproceedings{ijcai2025p564,
  title     = {Multi-player Multi-armed Bandits with Delayed Feedback},
  author    = {Fan, Jingqi and Wang, Zilong and Li, Shuai and Kong, Linghe},
  booktitle = {Proceedings of the Thirty-Fourth International Joint Conference on Artificial Intelligence, {IJCAI-25}},
  publisher = {International Joint Conferences on Artificial Intelligence Organization},
  editor    = {James Kwok},
  pages     = {5065--5073},
  year      = {2025},
  month     = {8},
  note      = {Main Track},
  doi       = {10.24963/ijcai.2025/564},
  url       = {https://doi.org/10.24963/ijcai.2025/564}
}`
        };

        function selectPaper(item) {
            workItems.forEach((paper) => {
                const isSelected = paper === item;
                paper.classList.toggle("is-active", isSelected);
                paper.setAttribute("aria-current", String(isSelected));
            });

            viewer.src = `${item.dataset.file}#view=FitH`;
            title.textContent = item.dataset.title;
            openDocument.href = item.dataset.file;
        }

        function showToast(message, isError = false) {
            clearTimeout(toastTimer);
            copyToast.textContent = message;
            copyToast.classList.toggle("is-error", isError);
            copyToast.classList.add("is-visible");
            toastTimer = setTimeout(() => {
                copyToast.classList.remove("is-visible");
            }, 2200);
        }

        async function copyCitation(item, button) {
            const citation = citations[item.dataset.paperId];
            const originalLabel = button.textContent;

            try {
                await navigator.clipboard.writeText(citation);
                button.textContent = "Copied";
                showToast("BibTeX copied to clipboard.");
            } catch (error) {
                const textArea = document.createElement("textarea");
                textArea.value = citation;
                textArea.setAttribute("readonly", "");
                textArea.style.position = "fixed";
                textArea.style.opacity = "0";
                document.body.appendChild(textArea);
                textArea.select();

                const copied = document.execCommand("copy");
                textArea.remove();

                if (!copied) {
                    showToast("Could not copy the citation.", true);
                    return;
                }

                button.textContent = "Copied";
                showToast("BibTeX copied to clipboard.");
            }

            setTimeout(() => {
                button.textContent = originalLabel;
            }, 1800);
        }

        workItems.forEach((item) => {
            item.querySelector(".paper-preview").addEventListener("click", () => {
                selectPaper(item);
            });

            item.querySelector(".cite-button").addEventListener("click", (event) => {
                copyCitation(item, event.currentTarget);
            });
        });
    </script>
